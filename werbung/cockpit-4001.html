<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Präsentations-Cockpit · Kurs 4001</title>
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#06060a; font-family:'Space Grotesk',system-ui,sans-serif; }
  body{ display:flex; }

  /* left: slides ~80% */
  .slides-pane{ flex:1 1 auto; height:100vh; min-width:0; position:relative; }

  /* right: reel strip ~20% */
  .reel-pane{ flex:0 0 20%; min-width:340px; max-width:460px; height:100vh; position:relative; border-left:4px solid #14101f; }
  .reel-pane::before{ /* subtle "LIVE" feel */
    content:'● LIVE'; position:absolute; top:12px; left:50%; transform:translateX(-50%);
    z-index:5; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.18em; color:#fff;
    background:rgba(0,0,0,.4); padding:4px 11px; border-radius:50px; pointer-events:none;
  }

  iframe{ width:100%; height:100%; border:0; display:block; }

  /* tiny help bar — auto-hides */
  .help{
    position:fixed; bottom:14px; left:14px; z-index:50;
    font-family:'DM Mono',monospace; font-size:12px; color:#fff; background:rgba(0,0,0,.5);
    padding:8px 14px; border-radius:50px; transition:opacity .5s; pointer-events:none;
  }
  .help.hide{ opacity:0; }
  .help b{ color:#48e0ff; }
</style>
</head>
<body>
  <div class="slides-pane">
    <iframe id="slides" src="demo-slides-4001.html" title="Folien"></iframe>
  </div>
  <div class="reel-pane">
    <iframe id="reel" src="reel-ki-4001.html?auto=1&embed=1" title="Reel (Loop)" allow="autoplay"></iframe>
  </div>

  <div class="help" id="help">
    Folien: <b>← →</b> / Leertaste · <b>F</b> = Vollbild · Reel läuft im Loop →
  </div>

<script>
  const sf = document.getElementById('slides');
  const help = document.getElementById('help');

  function slideWin(){ return sf.contentWindow; }

  // Drive the slides (in the iframe) from the top document, so keys work
  // no matter what's focused.
  document.addEventListener('keydown', (e)=>{
    const w = slideWin();
    try {
      if(['ArrowRight',' ','PageDown'].includes(e.key)){ e.preventDefault(); w.go(1); }
      else if(['ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); w.go(-1); }
      else if(e.key==='Home'){ e.preventDefault(); w.goFirst(); }
      else if(e.key==='End'){ e.preventDefault(); w.goLast(); }
      else if(e.key==='f' || e.key==='F'){
        e.preventDefault();
        if(!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }
    } catch(err){ /* iframe not ready yet */ }
  });

  // Clicking the slides should advance (presenter-friendly) without stealing F
  sf.addEventListener('load', ()=>{
    try {
      const d = sf.contentDocument;
      d.addEventListener('click', ()=> slideWin().go(1));
    } catch(err){}
  });

  // Auto-hide the help bar after a few seconds; show again on mouse move
  let hideTimer;
  function scheduleHide(){ clearTimeout(hideTimer); hideTimer = setTimeout(()=> help.classList.add('hide'), 4000); }
  document.addEventListener('mousemove', ()=>{ help.classList.remove('hide'); scheduleHide(); });
  scheduleHide();
</script>
</body>
</html>
